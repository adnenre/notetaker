name: Create Release

on:
  push:
    tags:
      - "v*"

jobs:
  create-zip-distribution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Liberica with JavaFX)
        uses: actions/setup-java@v4
        with:
          distribution: "liberica"
          java-version: "21"
          java-package: jdk+fx
          cache: maven

      - name: Cache JavaFX JMODs (Linux)
        id: cache-jmods
        uses: actions/cache@v3
        with:
          path: ~/javafx-jmods-21
          key: javafx-jmods-21-linux

      - name: Download JavaFX JMODs (if not cached)
        if: steps.cache-jmods.outputs.cache-hit != 'true'
        run: |
          wget -O javafx-jmods.zip https://download2.gluonhq.com/openjfx/21/openjfx-21_linux-x64_bin-jmods.zip
          mkdir -p ~/javafx-jmods-21
          unzip -q javafx-jmods.zip -d ~/javafx-jmods-21
          rm javafx-jmods.zip

      - name: Build fat JAR
        run: mvn clean package

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Create cross‑platform app image (portable)
        run: |
          jpackage --type app-image \
            --input target \
            --name NoteTaker \
            --main-jar "notetaker-${{ env.VERSION }}.jar" \
            --main-class com.exemple.notetaker.App \
            --module-path "$HOME/javafx-jmods-21" \
            --add-modules java.logging,javafx.controls,javafx.fxml,javafx.web \
            --icon src/main/resources/com/exemple/notetaker/icon.png

      - name: Package into ZIP
        run: |
          zip -r "NoteTaker-${{ env.VERSION }}.zip" NoteTaker

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteTaker-${{ env.VERSION }}
          path: NoteTaker-${{ env.VERSION }}.zip

  create-release:
    runs-on: ubuntu-latest
    needs: create-zip-distribution
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/NoteTaker-${{ env.VERSION }}/NoteTaker-${{ env.VERSION }}.zip
          body: |
            ## NoteTaker ${{ github.ref_name }}

            ### Cross‑platform ZIP distribution
            - Download the ZIP file for your operating system.
            - Extract it anywhere.
            - Run `NoteTaker/bin/NoteTaker` (Linux/macOS) or `NoteTaker\bin\NoteTaker.bat` (Windows).
            - No Java installation required – the JRE is bundled.
          draft: false
          prerelease: false
